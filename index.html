<style>
  :root{--ml-yellow:#ffe600;--ml-blue:#3483fa;--ml-dark:#2d3277;--ml-text:#1a1a2e;--muted:#737386;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ml-text);background:#ececed;}
  .wrap{max-width:1080px;margin:0 auto;padding:16px;}
  .card{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(20,20,50,.08);padding:16px 24px 26px;min-height:600px;position:relative;overflow:hidden;}
  .slidehead{display:flex;align-items:center;gap:10px;border-bottom:1px solid #eee;padding-bottom:10px;margin-bottom:8px;position:relative;z-index:3;}
  .slidehead img{height:30px;width:auto;}
  .slidehead span{font-weight:700;color:var(--ml-dark);font-size:15px;}
  .nav{display:flex;align-items:center;gap:10px;margin:6px 0;position:relative;z-index:3;}
  .nav button{width:36px;height:36px;border-radius:50%;border:none;background:#2b2b3a;color:#fff;font-size:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;}
  .nav button:hover{background:var(--ml-blue);}
  .nav button:disabled{opacity:.3;cursor:default;background:#2b2b3a;}
  .counter{font-size:13px;font-weight:700;color:var(--muted);}
  h1{font-size:22px;margin:6px 0 2px;}
  .subtitle{color:var(--muted);font-size:13px;margin:0 0 14px;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .filters .pill{border:1px solid #d5d5e0;background:#fff;color:var(--ml-text);padding:6px 14px;border-radius:7px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s;}
  .filters .pill.active{background:var(--ml-blue);color:#fff;border-color:var(--ml-blue);}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0 6px;font-size:12.5px;align-items:center;}
  .legend .item{display:flex;align-items:center;gap:6px;}
  .legend .sw{width:13px;height:13px;border-radius:3px;flex:none;}
  .chart-area{position:relative;}
  .dual{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
  .dual .col h3{text-align:center;font-size:15px;margin:4px 0 8px;}
  .src{margin-top:14px;font-size:11px;color:var(--muted);}
  .src a{color:var(--ml-blue);}
  .selectbox{display:flex;gap:10px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
  select{padding:6px 10px;border-radius:7px;border:1px solid #d5d5e0;font-size:13px;background:#fff;font-weight:600;color:var(--ml-text);}
  .map-wrap{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;}
  #mapSvg{width:100%;max-width:720px;height:auto;}
  .map-path{stroke:#fff;stroke-width:.6;cursor:pointer;transition:opacity .1s;}
  .map-path:hover{opacity:.75;stroke:#333;stroke-width:1.2;}
  .maptip{position:fixed;pointer-events:none;background:#1a1a2e;color:#fff;padding:7px 10px;border-radius:7px;font-size:12px;opacity:0;transition:opacity .1s;z-index:99;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.25);}
  .scale{display:flex;flex-direction:column;gap:6px;font-size:11px;color:var(--muted);min-width:160px;}
  .scalebar{height:14px;border-radius:4px;width:100%;}
  .scale .ticks{display:flex;justify-content:space-between;}
  /* cover (referencia "Ejemplo portada") */
  .coverB{text-align:center;padding-top:22px;}
  .coverB h1{font-size:40px;line-height:1.12;color:var(--ml-dark);margin:18px 0 6px;font-weight:800;}
  .coverB .csub{font-size:16px;color:var(--muted);margin-bottom:22px;}
  .coverB .skypanel{background:#eaf3ff;border-radius:12px;max-width:940px;margin:0 auto;padding:0;overflow:hidden;}
  .coverB .skypanel svg{width:100%;display:block;}
  .coverB .clogo{height:60px;margin:24px auto 6px;display:block;}
  @media(max-width:760px){.dual{grid-template-columns:1fr;}.coverB h1{font-size:27px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="slidehead"><img id="headLogo" alt="Mercado Libre"><span>Mercado Libre Inmuebles</span></div>
    <div class="nav"><button id="prev">&#8592;</button><button id="next">&#8594;</button><span class="counter" id="counter"></span></div>
    <div id="body"></div>
    <div class="src" id="src">Fuente: <a href="#">Mercado Libre Inmuebles Uruguay</a></div>
  </div>
</div>
<div class="maptip" id="maptip"></div>

function render(){
  destroyCharts();
  const s=SLIDES[idx];
  $('prev').disabled=idx===0; $('next').disabled=idx===SLIDES.length-1;
  $('counter').textContent = s.type==='cover' ? 'Portada' : (idx+'/'+TOTAL_CONTENT+'  ·  slide '+s.n);
  const body=$('body'); body.innerHTML=''; $('src').style.display='block';
  if(s.type==='cover'){renderCover(body,false);$('src').style.display='none';return;}
  if(s.type==='sectioncover'){renderCover(body,true,s);$('src').style.display='none';return;}
  body.innerHTML=`<h1>${s.title}</h1><p class="subtitle">${s.sub} · ${PERIODO}</p>
    <div class="filters" id="filters"></div><div class="selectbox" id="selectbox"></div>
    <div class="legend" id="legend"></div><div class="chart-area" id="chartArea"></div>`;
  F=$('filters');SB=$('selectbox');LG=$('legend');CA=$('chartArea');
  const usesDept = ['stacked_month','topbar','dorm','price'].includes(s.type);
  const usesPDept = ['topbar_p','etapas'].includes(s.type);
  if(usesDept){
    if(!DATA[s.key][state.dep]) state.dep=Object.keys(DATA[s.key])[0];
    DEPTS.forEach(d=>{if(!DATA[s.key][d])return;const b=document.createElement('button');b.className='pill'+(state.dep===d?' active':'');b.textContent=d;b.onclick=()=>{state.dep=d;render();};F.appendChild(b);});
  }
  if(usesPDept){
    if(!DATA[s.key][state.pdep]) state.pdep=Object.keys(DATA[s.key])[0];
    PDEPTS.forEach(d=>{if(!DATA[s.key][d])return;const b=document.createElement('button');b.className='pill'+(state.pdep===d?' active':'');b.textContent=d;b.onclick=()=>{state.pdep=d;render();};F.appendChild(b);});
  }
  if(s.type==='stacked_month') renderStackedMonth(s);
  else if(s.type==='topbar') renderTopbar(s,state.dep);
  else if(s.type==='topbar_p') renderTopbar(s,state.pdep);
  else if(s.type==='dorm') renderDorm(s);
  else if(s.type==='price') renderPrice(s);
  else if(s.type==='line') renderLine(s);
  else if(s.type==='map') renderMap(s);
  else if(s.type==='etapas') renderEtapas(s);
  else if(s.type==='precios_etapa') renderPreciosEtapa(s);
}

 </svg>`;}

function legendItems(items){LG.innerHTML=items.map(i=>`<span class="item"><span class="sw" style="background:${i.c}"></span>${i.t}</span>`).join('');}
function canvas(h){const d=document.createElement('div');d.style.position='relative';d.style.height=(h||430)+'px';const c=document.createElement('canvas');d.appendChild(c);CA.appendChild(d);return c;}

function renderStackedMonth(s){
  const dd=DATA[s.key][state.dep];
  legendItems(s.cats.map((c,i)=>({t:c,c:s.colors[i]})));
  const c=canvas(440);
  const ds=s.cats.map((cat,i)=>({label:cat,data:dd.series[cat],backgroundColor:s.colors[i],borderWidth:0,barPercentage:1,categoryPercentage:.97}));
  chartRefs.push(new Chart(c,{type:'bar',data:{labels:dd.months.map(fmtMonth),datasets:ds},options:{responsive:true,maintainAspectRatio:false,animation:false,
    scales:{x:{stacked:true,ticks:{maxRotation:90,minRotation:90,autoSkip:true,font:{size:9}},grid:{display:false}},y:{stacked:true,min:0,max:100,ticks:{callback:v=>v+'%'}}},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>x.dataset.label+': '+x.raw+'%'}}}}}));
}
function renderTopbar(s,dep){
  const arr=DATA[s.key][dep]||[];
  const c=canvas(Math.max(340, arr.length*42));
  chartRefs.push(new Chart(c,{type:'bar',data:{labels:arr.map(x=>x.barrio),datasets:[{data:arr.map(x=>x.pct),backgroundColor:s.color,borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,animation:false,
    scales:{x:{min:0,ticks:{callback:v=>v+'%'},grid:{color:'#eee'}},y:{grid:{display:false},ticks:{font:{size:12,weight:'600'}}}},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>x.raw+'%'}}}}}));
}
function renderDorm(s){
  const dd=DATA[s.key][state.dep];const dorms=dd.dorms;
  legendItems(dorms.map((d,i)=>({t:d,c:CATPAL[i]})));
  const grid=document.createElement('div');grid.className='dual';CA.appendChild(grid);
  ['Alquiler','Venta'].forEach(op=>{
    const col=document.createElement('div');col.className='col';const h=document.createElement('h3');h.textContent=op;col.appendChild(h);
    const wrap=document.createElement('div');wrap.style.position='relative';wrap.style.height='430px';const cv=document.createElement('canvas');wrap.appendChild(cv);col.appendChild(wrap);grid.appendChild(col);
    const o=dd.ops[op];if(!o||!o.barrios.length){h.textContent=op+' (sin datos)';return;}
    const ds=dorms.map((dm,i)=>({label:dm,data:o.series[dm],backgroundColor:CATPAL[i],borderWidth:0}));
    chartRefs.push(new Chart(cv,{type:'bar',data:{labels:o.barrios,datasets:ds},options:{responsive:true,maintainAspectRatio:false,animation:false,
      scales:{x:{stacked:true,grid:{display:false},ticks:{maxRotation:90,minRotation:60,font:{size:10}}},y:{stacked:true,min:0,max:100,ticks:{callback:v=>v+'%'}}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>x.dataset.label+': '+x.raw+'%'}}}}}));
  });
}
function renderPrice(s){
  const dd=DATA[s.key][state.dep];const ranges=dd.ranges,labels=dd.labels;
  legendItems(labels.map((l,i)=>({t:l,c:CATPAL[i%CATPAL.length]})));
  const grid=document.createElement('div');grid.className='dual';CA.appendChild(grid);
  ['Apartamento','Casa'].forEach(prop=>{
    const p=dd.props[prop];const col=document.createElement('div');col.className='col';
    const h=document.createElement('h3');h.textContent=prop;col.appendChild(h);
    const wrap=document.createElement('div');wrap.style.position='relative';wrap.style.height=Math.max(340,(p&&p.barrios.length?p.barrios.length:1)*26+40)+'px';
    const cv=document.createElement('canvas');wrap.appendChild(cv);col.appendChild(wrap);grid.appendChild(col);
    if(!p||!p.barrios.length){h.textContent=prop+' (sin datos)';return;}
    const ds=ranges.map((rg,i)=>({label:labels[i],data:p.series[rg],backgroundColor:CATPAL[i%CATPAL.length],borderWidth:0}));
    chartRefs.push(new Chart(cv,{type:'bar',data:{labels:p.barrios,datasets:ds},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,animation:false,
      scales:{x:{stacked:true,min:0,max:100,ticks:{callback:v=>v+'%'},grid:{display:false}},y:{stacked:true,grid:{display:false},ticks:{font:{size:10}}}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>x.dataset.label+': '+(x.raw==null?'s/d':x.raw+'%')}}}}}));
  });
}
function renderLine(s){
  const dd=DATA[s.key];
  ['Alquiler','Venta'].forEach(op=>{const b=document.createElement('button');b.className='pill'+(state.op===op?' active':'');b.textContent=op;b.onclick=()=>{state.op=op;render();};F.appendChild(b);});
  const o=dd.ops[state.op];
  legendItems([{t:'Apartamento',c:'#3483fa'},{t:'Casa',c:'#7ac143'}]);
  const unit=state.op==='Venta'?' USD/m²':' $';
  const c=canvas(440);
  chartRefs.push(new Chart(c,{type:'line',data:{labels:o.months.map(fmtMonth),datasets:[
     {label:'Apartamento',data:o.Apartamento,borderColor:'#3483fa',backgroundColor:'#3483fa',tension:.25,pointRadius:1.5,borderWidth:2},
     {label:'Casa',data:o.Casa,borderColor:'#7ac143',backgroundColor:'#7ac143',tension:.25,pointRadius:1.5,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},
    scales:{x:{ticks:{maxRotation:90,minRotation:90,autoSkip:true,font:{size:9}},grid:{display:false}},y:{min:0,ticks:{callback:v=>fmtNum(v)}}},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>x.dataset.label+': '+fmtNum(x.raw)+unit}}}}}));
}
function renderEtapas(s){
  const dd=DATA[s.key][state.pdep];const et=dd.etapas;
  legendItems(et.map(e=>({t:e,c:ETAPA_COL[e]})));
  const c=canvas(440);
  const ds=et.map((e,i)=>({label:e,data:[dd.Oferta[i],dd.Demanda[i]],backgroundColor:ETAPA_COL[e],borderWidth:0,barPercentage:.6}));
  chartRefs.push(new Chart(c,{type:'bar',data:{labels:['Oferta','Demanda'],datasets:ds},options:{responsive:true,maintainAspectRatio:false,animation:false,
    scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:13,weight:'600'}}},y:{stacked:true,min:0,max:100,ticks:{callback:v=>v+'%'}}},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>x.dataset.label+': '+x.raw+'%'}}}}}));
}
function renderPreciosEtapa(s){
  const dd=DATA[s.key]['Montevideo'];const et=dd.etapas;
  legendItems(et.map(e=>({t:e,c:ETAPA_COL[e]})));
  const c=canvas(Math.max(360, dd.barrios.length*70));
  const ds=et.map(e=>({label:e,data:dd.series[e],backgroundColor:ETAPA_COL[e],borderWidth:0,borderRadius:2}));
  chartRefs.push(new Chart(c,{type:'bar',data:{labels:dd.barrios,datasets:ds},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,animation:false,
    scales:{x:{min:0,ticks:{callback:v=>'USD '+fmtNum(v)},grid:{color:'#eee'}},y:{grid:{display:false},ticks:{font:{size:12,weight:'600'}}}},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>x.dataset.label+': '+(x.raw==null?'s/d':'USD '+fmtNum(x.raw))}}}}}));
  const note=document.createElement('div');
  note.style.cssText='margin-top:12px;font-size:11.5px;color:#888;line-height:1.5;border-top:1px solid #eee;padding-top:8px';
  note.innerHTML='Mediana del precio (USD) por barrio y etapa. La etapa se infiere del ordenamiento de precios de cada proyecto, así que los valores son orientativos.';
  CA.appendChild(note);
}
const METRICS={
  alquiler_pesos:{label:'Valor alquiler ($)',fmt:v=>'$ '+fmtNum(v),ramp:['#e8f0fb','#3483fa','#1c3f8f']},
  venta_m2_usd:{label:'Valor venta (USD/m²)',fmt:v=>'USD '+fmtNum(v)+'/m²',ramp:['#eef7e9','#7ac143','#2f6b1f']},
  rentabilidad:{label:'Rentabilidad Bruta Anual',fmt:v=>v+'%',ramp:['#eafaf0','#43c96b','#166b32']}
};
function lerpColor(a,b,t){const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];return 'rgb('+pa.map((x,i)=>Math.round(x+(pb[i]-x)*t)).join(',')+')';}
function rampColor(ramp,t){if(t<=0)return ramp[0];if(t>=1)return ramp[ramp.length-1];const seg=1/(ramp.length-1);const i=Math.min(ramp.length-2,Math.floor(t/seg));return lerpColor(ramp[i],ramp[i+1],(t-i*seg)/seg);}
function eachRing(g,cb){if(g.type==='Polygon')g.coordinates.forEach(cb);else if(g.type==='MultiPolygon')g.coordinates.forEach(po=>po.forEach(cb));}
function renderMap(s){
  ['Apartamento','Casa'].forEach(p=>{const b=document.createElement('button');b.className='pill'+(state.prop===p?' active':'');b.textContent=p;b.onclick=()=>{state.prop=p;render();};F.appendChild(b);});
  const sel=document.createElement('select');
  Object.keys(METRICS).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=METRICS[k].label;if(k===state.metric)o.selected=true;sel.appendChild(o);});
  sel.onchange=()=>{state.metric=sel.value;render();};SB.appendChild(sel);
  const M=METRICS[state.metric];const vals={};let mn=Infinity,mx=-Infinity;const dd=DATA.slide16[state.prop];
  for(const k in dd){const v=dd[k][state.metric];if(v!=null){vals[k]=v;if(v<mn)mn=v;if(v>mx)mx=v;}}
  const feats=GEO.features;let minx=Infinity,miny=Infinity,maxx=-Infinity,maxy=-Infinity;
  feats.forEach(f=>eachRing(f.geometry,r=>r.forEach(p=>{if(p[0]<minx)minx=p[0];if(p[0]>maxx)maxx=p[0];if(p[1]<miny)miny=p[1];if(p[1]>maxy)maxy=p[1];})));
  const W=720,H=560,pad=10;const latm=(miny+maxy)/2*Math.PI/180;
  const sc=Math.min((W-2*pad)/((maxx-minx)*Math.cos(latm)),(H-2*pad)/(maxy-miny));
  const offx=pad+((W-2*pad)-(maxx-minx)*Math.cos(latm)*sc)/2, offy=pad+((H-2*pad)-(maxy-miny)*sc)/2;
  function proj(p){return [offx+(p[0]-minx)*Math.cos(latm)*sc, offy+(maxy-p[1])*sc];}
  const LOW=50;  // umbral de muestra reducida (cantidad de anuncios)
  let lowCount=0;
  let paths='';
  feats.forEach(f=>{const name=f.properties.nombre;const v=vals[name];const t=(v==null||mx===mn)?null:(v-mn)/(mx-mn);const col=v==null?'#ededf2':rampColor(M.ramp,t);
    const an=(dd[name]&&dd[name].anuncios!=null)?dd[name].anuncios:null;
    const low=(v!=null && an!=null && an<LOW);
    if(low) lowCount++;
    let d='';eachRing(f.geometry,ring=>{d+='M'+ring.map(p=>{const q=proj(p);return q[0].toFixed(1)+','+q[1].toFixed(1);}).join('L')+'Z';});
    paths+=`<path class="map-path" d="${d}" fill="${col}" data-name="${name.replace(/"/g,'')}" data-val="${v==null?'':M.fmt(v)}" data-low="${low?1:0}"></path>`;
    if(low) paths+=`<path class="map-hatch" d="${d}" fill="url(#hatch)" pointer-events="none"></path>`;});
  const defs=`<defs><pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#5a5a6e" stroke-width="1.1" opacity="0.55"/></pattern></defs>`;
  const wrap=document.createElement('div');wrap.className='map-wrap';
  wrap.innerHTML=`<svg id="mapSvg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${defs}${paths}</svg>
   <div class="scale"><b>${M.label} · ${state.prop}</b>
     <div class="scalebar" style="background:linear-gradient(90deg,${M.ramp.join(',')})"></div>
     <div class="ticks"><span>${isFinite(mn)?M.fmt(mn):''}</span><span>${isFinite(mx)?M.fmt(mx):''}</span></div>
     <div style="margin-top:6px;color:#999">Gris = sin datos suficientes</div>
     <div style="margin-top:10px;display:flex;align-items:center;gap:7px;color:#666"><span style="width:16px;height:12px;flex:none;background:#dfe6f2;background-image:repeating-linear-gradient(45deg,#5a5a6e 0 1px,transparent 1px 4px);border-radius:2px"></span> Muestra reducida${lowCount?' ('+lowCount+(lowCount===1?' barrio':' barrios')+')':''}</div>
     <div style="margin-top:5px;font-size:11px;color:#999">Las zonas rayadas se calcularon con muy pocos anuncios (menos de ${LOW}); su valor es indicativo y puede ser inestable.</div>
     <div style="margin-top:10px;font-size:11px;color:#999">Rentab. bruta anual = valor m² alquiler × 12 / valor m² venta</div></div>`;
  CA.appendChild(wrap);
  const tip=$('maptip');
  wrap.querySelectorAll('.map-path').forEach(p=>{
    p.addEventListener('mousemove',e=>{tip.style.opacity=1;tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px';const val=p.getAttribute('data-val');const low=p.getAttribute('data-low')==='1';tip.innerHTML='<b>'+p.getAttribute('data-name')+'</b><br>'+M.label+': '+(val||'s/d')+(low?'<br><span style="color:#ffd24d">⚠ muestra reducida</span>':'');});
    p.addEventListener('mouseleave',()=>tip.style.opacity=0);
  });
}
$('prev').onclick=()=>{if(idx>0){idx--;render();}};
$('next').onclick=()=>{if(idx<SLIDES.length-1){idx++;render();}};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')$('next').click();if(e.key==='ArrowLeft')$('prev').click();});
render();
</script>
